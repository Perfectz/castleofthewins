<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1a15">
  <title>Castle of the Winds</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;500;700;800&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="mobile-app">
    <header class="top-band panel">
      <div class="top-band-status">
        <div id="run-status" class="utility-chip utility-run-status">Title Screen</div>
        <div id="pressure-status" class="utility-chip utility-chip-muted">Town Calm</div>
      </div>
      <div class="top-band-actions">
        <button id="utility-menu-button" class="utility-menu-button" data-action="open-utility-menu" data-focus-key="top:menu" type="button">Menu</button>
      </div>
    </header>

    <main class="play-layout">
      <section class="board-cluster">
        <section class="board-stage panel">
          <div class="board-frame">
            <canvas id="game-canvas" width="600" height="600" aria-label="Game board"></canvas>
          </div>
          <div class="board-overlays">
            <button id="spell-tray-toggle-button" class="utility-menu-button map-chip-button spell-chip-button hidden" data-action="open-spell-tray" data-focus-key="top:spell-tray" type="button">Magic</button>
            <section id="spell-tray" class="spell-tray hidden" aria-live="polite"></section>
            <div id="context-chip" class="context-chip hidden" aria-live="polite"></div>
          </div>
        </section>
      </section>
    </main>

    <section class="bottom-band panel">
      <section class="status-band">
        <section id="map-panel" class="map-panel">
          <div class="map-panel-head">
            <span id="map-panel-label" class="advisor-label">Overworld Map</span>
            <span id="map-panel-state" class="field-summary-state">No active run</span>
          </div>
          <canvas id="map-canvas" width="280" height="280" aria-label="Area map"></canvas>
          <div id="map-caption" class="mini-caption"></div>
        </section>
        <div id="player-capsule" class="stat-band"></div>
      </section>

      <div id="event-ticker" class="message-log"></div>

      <section id="action-bar" class="action-bar classic-action-bar"></section>

      <section id="touch-controls" class="touch-controls">
        <div class="touch-pad">
          <button class="pad-button" data-move="-1,-1" type="button">&#8598;</button>
          <button class="pad-button" data-move="0,-1" type="button">&#8593;</button>
          <button class="pad-button" data-move="1,-1" type="button">&#8599;</button>
          <button class="pad-button" data-move="-1,0" type="button">&#8592;</button>
          <button class="pad-button pad-center" data-action="stairs-or-wait" type="button">&#8226;</button>
          <button class="pad-button" data-move="1,0" type="button">&#8594;</button>
          <button class="pad-button" data-move="-1,1" type="button">&#8601;</button>
          <button class="pad-button" data-move="0,1" type="button">&#8595;</button>
          <button class="pad-button" data-move="1,1" type="button">&#8600;</button>
        </div>
      </section>
    </section>
  </div>

  <div id="modal-root" class="modal-root hidden" aria-live="polite"></div>

  <template id="title-template">
    <div class="modal mobile-sheet title-screen">
      <div class="title-screen-grid">
        <section class="title-showcase-panel">
          <div class="title-cinematic-backdrop" aria-hidden="true">
            <img id="title-loop-image" class="title-cinematic-media" src="" alt="" loading="eager" decoding="async" fetchpriority="high">
          </div>
          <div class="title-showcase-content">
            <div class="title-launcher-copy title-launcher-copy-hero">
              <div class="title-screen-kicker">A winter roguelike of quick descents</div>
              <h2 class="title-screen-heading">Castle of the Winds</h2>
              <div class="title-screen-copy">
                Descend the keep. Claim the Runestone. Return alive.
              </div>
            </div>
            <div class="title-audio-banner">
              <div class="title-audio-copy">
                <div class="title-audio-label">Title Theme</div>
                <div class="title-audio-note" data-role="title-music-note"></div>
              </div>
              <button id="title-music-button" class="action-button title-audio-toggle" data-action="toggle-music" data-role="title-music-toggle" data-focus-key="title:music" type="button">Mute Music</button>
            </div>
            <div class="title-hero-footer">
              <div id="title-save-summary" class="title-save-summary hidden"></div>
              <div class="modal-actions title-actions">
                <button class="action-button primary" data-action="new-game" data-focus-key="title:new-game" type="button">Start Run</button>
                <button id="title-load-button" class="action-button" data-action="load-game" data-focus-key="title:load" type="button">Continue Save</button>
                <button class="action-button title-help-link" data-action="help" data-focus-key="title:help" type="button">Learn Basics</button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </template>

  <template id="creation-template">
    <div class="modal mobile-sheet modal-large creation-sheet">
      <div class="modal-title">Create Adventurer</div>
      <div class="creation-intro text-block">
        Build a travel-ready loadout. Keep the board readable, start light, and commit to an opening style you can sustain through the first floor.
      </div>
      <div class="creation-sheet-grid">
        <section class="creation-sheet-main">
          <label class="field-label" for="hero-name">Name</label>
          <input class="field-input" id="hero-name" name="heroName" maxlength="20" value="Morgan" data-focus-key="creation:name">

          <div class="field-group">
            <div class="field-label">Race</div>
            <div class="choice-grid" id="race-choice"></div>
          </div>

          <div class="field-group">
            <div class="field-label">Class</div>
            <div class="choice-grid" id="class-choice"></div>
          </div>

          <div class="field-group">
            <div class="creation-stat-header">
              <div class="field-label">Attributes</div>
              <button class="tiny-button" data-action="creation-reset-stats" data-focus-key="creation:reset-stats" type="button">Reset Points</button>
            </div>
            <div id="creation-stat-points" class="creation-points-note"></div>
            <div id="creation-stat-allocation" class="creation-stat-allocation"></div>
          </div>
        </section>
      </div>
      <div class="modal-actions">
        <button class="action-button" data-action="close-modal" data-focus-key="creation:back" type="button">Back</button>
        <button class="action-button primary" data-action="begin-adventure" data-focus-key="creation:begin" type="button">Begin Adventure</button>
      </div>
    </div>
  </template>

  <template id="list-modal-template">
    <div class="modal mobile-sheet modal-large">
      <div class="modal-title" id="generic-modal-title"></div>
      <div class="modal-body" id="generic-modal-body"></div>
      <div class="modal-actions">
        <button class="action-button" data-action="close-modal" data-focus-key="modal:close" type="button">Close</button>
      </div>
    </div>
  </template>

  <template id="utility-menu-template">
    <div class="modal mobile-sheet utility-menu-sheet">
      <div class="modal-title">Adventure Menu</div>
      <div class="modal-body utility-menu-body">
        <div class="utility-menu-actions">
          <section class="utility-menu-group">
            <div class="field-label">Run</div>
            <div class="utility-menu-group-grid">
              <button class="action-button" data-action="open-hub" data-tab="journal" data-journal-section="mission" data-focus-key="utility:briefing" type="button">Mission</button>
              <button class="action-button" data-action="open-hub" data-tab="journal" data-journal-section="current" data-focus-key="utility:journal" type="button">Field Guide</button>
              <button id="utility-stats-button" class="action-button" data-action="open-character-sheet" data-focus-key="utility:stats" type="button">Character</button>
            </div>
          </section>
          <section class="utility-menu-group">
            <div class="field-label">Saves</div>
            <div class="utility-menu-group-grid">
              <button id="utility-save-button" class="action-button" data-action="save-game" data-focus-key="utility:save" type="button">Save Slot</button>
              <button id="utility-load-button" class="action-button" data-action="load-game" data-focus-key="utility:load" type="button">Load Slot</button>
            </div>
          </section>
          <section class="utility-menu-group">
            <div class="field-label">System</div>
            <div class="utility-menu-group-grid">
              <button class="action-button" data-action="view-map" data-focus-key="utility:map" type="button">Floor Map</button>
              <button class="action-button" data-action="settings" data-focus-key="utility:settings" type="button">Settings</button>
              <button class="action-button" data-action="open-hub" data-tab="journal" data-journal-section="guide" data-focus-key="utility:help" type="button">Rules</button>
              <button class="action-button primary utility-menu-primary-action" data-action="close-modal" data-focus-key="utility:close" type="button">Return to Run</button>
            </div>
            <button class="action-button action-button-subtle utility-trace-button" data-action="export-telemetry" data-focus-key="utility:trace" type="button">Export Trace</button>
          </section>
        </div>
        <section class="utility-menu-panel">
          <div class="field-label">Right Now</div>
          <div id="utility-run-summary" class="utility-menu-summary"></div>
        </section>
        <section class="utility-menu-panel">
          <div class="field-label">Resume Point</div>
          <div id="utility-save-summary" class="utility-menu-summary"></div>
        </section>
        <section class="utility-menu-panel">
          <div class="field-label">Device & Controls</div>
          <div id="utility-control-summary" class="utility-menu-summary"></div>
        </section>
      </div>
    </div>
  </template>

  <script>
    (function () {
      var script = document.createElement("script");
      if (window.location.protocol === "file:") {
        script.src = "app.js";
      } else {
        script.type = "module";
        script.src = "src/main.js";
      }
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
